<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Teacher Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

    <div th:replace="~{fragments/navbar :: navbar}"></div>


    <div class="max-w-6xl mx-auto mt-10 bg-white shadow-lg rounded-xl p-5 md:p-8">

        <h2 class="text-2xl md:text-3xl font-bold text-center text-blue-900 mb-8">
            Teacher Registration
        </h2>


        <form th:action="@{/teacher/save}" th:object="${teacher}" method="post" enctype="multipart/form-data">


            <!-- Personal Details -->

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">


                <input class="border p-3 rounded w-full" type="text" th:field="*{fullName}" placeholder="Full Name">


                <input class="border p-3 rounded w-full" type="text" th:field="*{fatherOrMotherName}"
                    placeholder="Father/Mother Name">



                <select class="border p-3 rounded w-full" th:field="*{gender}">

                    <option value="">Select Gender</option>

                    <option value="Male">Male</option>

                    <option value="Female">Female</option>

                    <option value="Other">Other</option>

                </select>



                <input class="border p-3 rounded w-full" type="date" th:field="*{dateOfBirth}">



                <input class="border p-3 rounded w-full" type="text" th:field="*{mobileNumber}"
                    placeholder="Mobile Number">



                <input class="border p-3 rounded w-full" type="email" th:field="*{email}" placeholder="Email">


            </div>



            <!-- Address -->

            <h3 class="text-xl font-bold mt-8 mb-3">
               
            </h3>


            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">


                <input class="border p-3 rounded w-full" th:field="*{address}" placeholder="Address">


                <input class="border p-3 rounded w-full" th:field="*{city}" placeholder="City">


                <input class="border p-3 rounded w-full" th:field="*{state}" placeholder="State">


                <input class="border p-3 rounded w-full" th:field="*{pincode}" placeholder="Pincode">


            </div>





            <!-- Qualification -->


            <h3 class="text-xl font-bold mt-8 mb-3">
                <!-- Qualification -->
            </h3>


            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">


                <input class="border p-3 rounded w-full" th:field="*{qualification}" placeholder="Qualification">


                <input class="border p-3 rounded w-full" th:field="*{specialization}" placeholder="Subject">


                <input class="border p-3 rounded w-full" type="number" th:field="*{experienceYears}"
                    placeholder="Experience Years">



                <input class="border p-3 rounded w-full" th:field="*{previousSchoolName}" placeholder="Previous School">



                <input class="border p-3 rounded w-full" type="date" th:field="*{joiningDate}">


            </div>




            <!-- Documents -->


            <h3 class="text-xl font-bold mt-8 mb-3">
                <!-- Documents -->
            </h3>


            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">


                <input class="border p-3 rounded w-full" type="text" th:field="*{aadhaarNumber}"
                    placeholder="Aadhaar Number">



                <label class="border p-3 rounded">

                    Profile Photo

                    <input type="file" name="profilePhoto" class="mt-2">

                </label>



                <label class="border p-3 rounded">

                    Aadhaar / ID Proof

                    <input type="file" name="aadhaarOrIdProof" class="mt-2">

                </label>



                <label class="border p-3 rounded">

                    Qualification Certificate

                    <input type="file" name="qualificationCertificate" class="mt-2">

                </label>



                <label class="border p-3 rounded">

                    Experience Certificate

                    <input type="file" name="experienceCertificate" class="mt-2">

                </label>



                <label class="border p-3 rounded">

                    Resume

                    <input type="file" name="resume" class="mt-2">

                </label>


            </div>




            <button class="mt-8 bg-blue-900 hover:bg-blue-700 text-white px-10 py-3 rounded-lg w-full md:w-auto">

                Register Teacher

            </button>



        </form>

    </div>



    <div th:replace="~{fragments/footer :: footer}"></div>


</body>

</html>
