<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Students</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col justify-between">

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <main class="container mx-auto p-4 sm:p-6 flex-grow">

        <h1 class="text-2xl sm:text-3xl font-bold mb-6 text-center text-blue-900">
            Registered Students Dashboard
        </h1>

        <div class="mb-6">
            <div th:replace="~{fragments/search :: studentSearch}"></div>
        </div>

        <div class="bg-white shadow-xl rounded-xl border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto w-full scrollbar-thin scrollbar-thumb-gray-300">
                
                <table class="w-full text-left border-collapse min-w-[1200px]">
                    
                    <thead class="bg-blue-900 text-white border-b border-blue-950">
                        <tr>
                            <th class="p-4 font-semibold text-center text-sm tracking-wider w-16">ID</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-36">Application ID</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-44">Student Name</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-44">Father Name</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-56">Email Address</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-36">Mobile No.</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-24 text-center">Class</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-40 text-center">Identity Proof No.</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-28 text-center">View Doc</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-32 text-center">DOB</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-64">Address Details</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-32 text-center">Status</th>
                            <th class="p-4 font-semibold text-sm tracking-wider w-48 text-center">Admin Action</th>
                        </tr>
                    </thead>

                    <tbody class="divide-y divide-gray-200 text-sm text-gray-700">
                        <tr th:each="student : ${students}" class="hover:bg-slate-50 transition-colors duration-150">
                            
                            <td class="p-4 text-center font-medium text-gray-900" th:text="${student.id}"></td>
                            
                            <td class="p-4 font-mono text-xs font-semibold text-blue-900 whitespace-nowrap" th:text="${student.applicationId}"></td>
                            
                            <td class="p-4 font-semibold text-gray-900 whitespace-nowrap" th:text="${student.studentName}"></td>
                            
                            <td class="p-4 whitespace-nowrap text-gray-600" th:text="${student.fatherName}"></td>
                            
                            <td class="p-4 max-w-[200px] truncate text-gray-600" th:text="${student.email}" th:title="${student.email}"></td>
                            
                            <td class="p-4 whitespace-nowrap font-medium text-gray-800" th:text="${student.mobile}"></td>
                            
                            <td class="p-4 text-center whitespace-nowrap font-semibold text-gray-700" th:text="${student.className}"></td>
                            
                            <td class="p-4 text-center font-mono whitespace-nowrap text-gray-800" th:text="${student.aadhar}"></td>
                            
                            <td class="p-4 text-center">
                                <a th:href="@{'/uploads/' + ${student.aadhaarCardPath}}" target="_blank"
                                   class="inline-flex p-1.5 text-blue-600 hover:text-blue-900 hover:bg-blue-50 rounded-lg transition-all"
                                   title="View Document File">
                                    <i data-lucide="eye" class="w-5 h-5"></i>
                                </a>
                            </td>
                            
                            <td class="p-4 text-center whitespace-nowrap text-gray-600" th:text="${student.dob}"></td>
                            
                            <td class="p-4 max-w-xs text-xs text-gray-600 leading-relaxed break-words" th:text="${student.address}"></td>
                            
                            <td class="p-4 text-center whitespace-nowrap">
                                <span th:if="${student.status == 'PENDING'}" class="inline-block px-2.5 py-1 text-xs font-semibold rounded-full bg-amber-100 text-amber-800 border border-amber-200" th:text="${student.status}"></span>
                                <span th:if="${student.status == 'APPROVED'}" class="inline-block px-2.5 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800 border border-green-200" th:text="${student.status}"></span>
                                <span th:if="${student.status == 'REJECTED'}" class="inline-block px-2.5 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800 border border-red-200" th:text="${student.status}"></span>
                            </td>

                            <td class="p-4">
                                <div class="flex items-center justify-center gap-1.5 text-xs font-medium">
                                    
                                    <th:block th:if="${student.status == 'PENDING'}">
                                        <a th:href="@{/admin/approve/{id}(id=${student.id})}"
                                           class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded shadow-sm transition">
                                            Approve
                                        </a>
                                        <a th:href="@{/admin/reject/{id}(id=${student.id})}"
                                           class="bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded shadow-sm transition">
                                            Reject
                                        </a>
                                    </th:block>

                                    <th:block th:if="${student.status != 'PENDING'}">
                                        <button disabled class="bg-gray-200 text-gray-400 px-3 py-1.5 rounded cursor-not-allowed border border-gray-300" 
                                                th:text="${student.status == 'APPROVED' ? 'Approved' : 'Rejected'}">
                                        </button>
                                    </th:block>

                                    <a th:href="@{/admin/delete/{id}(id=${student.id})}"
                                       onclick="return confirm('Are you sure you want to completely delete this student record?')"
                                       class="bg-slate-700 hover:bg-slate-900 text-white px-3 py-1.5 rounded shadow-sm transition">
                                        Delete
                                    </a>

                                </div>
                            </td>

                        </tr>
                    </tbody>

                </table>

            </div>
        </div>

    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script>
        // Init Icons Render Trigger
        lucide.createIcons();
    </script>

</body>

</html>
