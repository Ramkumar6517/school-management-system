<div th:fragment="studentSearch" class="mb-5 w-full">

    <form th:action="@{/admin/student-id-list}" 
          method="get"
          class="flex flex-col sm:flex-row gap-3 w-full">

        <input 
            type="text"
            name="keyword"
            placeholder="Search student..." 
            autocomplete="off"
            class="p-3 border rounded w-full sm:flex-1 min-w-0 focus:outline-none focus:ring-2 focus:ring-blue-900">

        <button 
            type="submit"
            class="bg-blue-900 hover:bg-blue-800 text-white p-3 sm:px-5 rounded transition-colors w-full sm:w-auto font-medium">
            Search
        </button>

    </form>

</div>
