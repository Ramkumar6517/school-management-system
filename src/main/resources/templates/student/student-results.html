<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>


<body class="bg-gray-100 p-10">


    <div class="bg-white p-6 rounded shadow">


        <h1 class="text-2xl font-bold">
            Student Result 🎓
        </h1>


        <p>
            Student:
            <span th:text="${student.studentName}">
            </span>
        </p>


        <table class="w-full mt-5 border">

            <tr class="bg-gray-200">

                <th class="border p-2">
                    Exam
                </th>

                <th class="border p-2">
                    Subject
                </th>

                <th class="border p-2">
                    Obtained Marks
                </th>

                <th class="border p-2">
                    Total Marks
                </th>

                <th class="border p-2">
                    Status
                </th>

            </tr>



            <tr th:each="m:${marks}">


                <td class="border p-2" th:text="${m.exam}">
                </td>


                <td class="border p-2" th:text="${m.subject}">
                </td>


                <td class="border p-2" th:text="${m.obtainedMarks}">
                </td>


                <td class="border p-2" th:text="${m.totalMarks}">
                </td>


                <td class="border p-2" th:text="${m.status}">
                </td>


            </tr>


        </table>



        <h2 class="mt-5 text-xl font-bold text-green-600">

            Result Declared 🎉

        </h2>



    </div>


</body>

</html>
