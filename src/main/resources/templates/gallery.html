<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        #imageModal {
            display: none;
        }
    </style>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="min-h-screen py-10">

    <h1 class="text-3xl md:text-5xl font-bold text-center text-blue-900 mb-10">
        Gallery Images
    </h1>

    <div id="galleryContainer"
         class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 px-6">
    </div>

</section>


<!-- IMAGE MODAL -->
<div id="imageModal"
     class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 p-5">

    <button onclick="closeImage()"
            class="absolute top-5 right-5 text-white text-4xl font-bold">
        ×
    </button>

    <img id="bigImage"
         class="max-h-[90vh] max-w-full object-contain rounded-xl shadow-2xl">
</div>


<!-- Footer -->
<div th:replace="~{fragments/footer :: footer}"></div>


<script th:inline="javascript">

let category = /*[[${category}]]*/ "GALLERY";

let galleryContainer = document.getElementById("galleryContainer");

// Loading UI
galleryContainer.innerHTML = `
<div class="col-span-full text-center">
    <h2 class="text-xl font-bold text-blue-900">Loading images...</h2>
</div>
`;

fetch('/api/gallery?category=' + category)
.then(res => res.json())
.then(data => {

    let html = "";

    if (data.length === 0) {

        html = `
        <div class="col-span-full text-center">
            <h2 class="text-2xl font-bold text-red-600">
                No ${category} image found
            </h2>
            <p class="text-gray-600 mt-2">
                Images will be uploaded soon
            </p>
        </div>
        `;

    } else {

        data.forEach(img => {

            html += `
            <div class="bg-white rounded-xl shadow-lg overflow-hidden group">

                <img 
                    src="${img.imagePath}"
                    onclick="openImage('${img.imagePath}')"
                    class="w-full h-64 cursor-pointer transition duration-300 group-hover:scale-105 ${getImageClass(img.category)}">

                <div class="p-4">
                    <p class="text-center font-semibold text-gray-700">
                        ${img.category}
                    </p>
                </div>

            </div>
            `;
        });
    }

    galleryContainer.innerHTML = html;

})
.catch(err => {
    console.log(err);

    galleryContainer.innerHTML = `
    <div class="col-span-full text-center text-red-600">
        Failed to load images
    </div>
    `;
});


// IMAGE STYLE FIX (MAIN SOLUTION)
function getImageClass(category) {

    if (category === "GALLERY") {
        return "object-cover object-top";
    }

    if (category === "SPORTS") {
        return "object-contain bg-gray-100 p-2";
    }

    if (category === "EVENT") {
        return "object-contain bg-gray-50 p-2";
    }

    return "object-cover";
}


// OPEN IMAGE
function openImage(src) {
    let modal = document.getElementById("imageModal");
    let img = document.getElementById("bigImage");

    img.src = src;
    modal.style.display = "flex";
}


// CLOSE IMAGE
function closeImage() {
    document.getElementById("imageModal").style.display = "none";
}


// CLICK OUTSIDE CLOSE
document.getElementById("imageModal").addEventListener("click", function (e) {
    if (e.target.id === "imageModal") {
        closeImage();
    }
});

</script>

</body>
</html>
