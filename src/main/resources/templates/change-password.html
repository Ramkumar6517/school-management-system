<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Password</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>



<body class="bg-gray-100 min-h-screen flex flex-col">



<!-- NAVBAR -->

<div th:replace="~{fragments/navbar :: navbar}"></div>





<!-- MAIN -->

<main class="flex-1 flex items-center justify-center px-4 py-8">



<div class="bg-white shadow-xl rounded-2xl p-6 sm:p-8 w-full max-w-md">





<h2 class="text-2xl sm:text-3xl font-bold text-center text-blue-900 mb-6">

🔑 Change Password

</h2>





<!-- ERROR MESSAGE -->

<p th:if="${error}"

class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-center"

th:text="${error}">

</p>







<form th:action="@{/student/change-password}" method="post">





<!-- NEW PASSWORD -->


<div class="mb-5">


<label class="block text-gray-700 font-semibold mb-2">

New Password

</label>



<input type="password"

name="newPassword"

placeholder="Enter New Password"

class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"

required>


</div>







<!-- CONFIRM PASSWORD -->


<div class="mb-6">


<label class="block text-gray-700 font-semibold mb-2">

Confirm Password

</label>



<input type="password"

name="confirmPassword"

placeholder="Confirm New Password"

class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"

required>


</div>







<button type="submit"

class="w-full bg-blue-900 text-white py-3 rounded-lg hover:bg-blue-700 transition duration-300">


Change Password


</button>





</form>






<div class="text-center mt-6">


<a th:href="@{/student/dashboard}"

class="text-blue-900 hover:underline text-sm sm:text-base">


← Back to Dashboard


</a>


</div>





</div>


</main>








<!-- FOOTER -->


<div th:replace="~{fragments/footer :: footer}"></div>





</body>

</html>
