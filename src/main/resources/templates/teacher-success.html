<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Registration Success</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-100 min-h-screen flex items-center justify-center p-5">


<div class="bg-white w-full max-w-md p-6 md:p-8 rounded-xl shadow-lg text-center">


    <h1 class="text-green-600 text-2xl md:text-3xl font-bold">
        Registration Successful 🎉
    </h1>


    <div class="mt-6 space-y-3 text-gray-700">


        <p class="text-lg">
            Teacher ID:
            <span class="font-bold text-blue-900"
                  th:text="${teacherId}">
            </span>
        </p>



        <p class="text-lg">
            Password (DOB):
            <span class="font-bold text-blue-900"
                  th:text="${password}">
            </span>
        </p>



        <p class="mt-5 text-blue-600 font-semibold">
            Credentials sent to Email & Mobile
        </p>


    </div>


    <a href="/teacher/register"
       class="inline-block mt-6 bg-blue-900 hover:bg-blue-700 text-white px-6 py-3 rounded-lg">

        Register Another Teacher

    </a>


</div>


</body>

</html>
