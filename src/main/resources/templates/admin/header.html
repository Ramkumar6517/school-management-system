<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Change Header</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-2xl shadow-lg rounded-xl p-6">

        <h2 class="text-2xl font-bold text-center text-blue-900 mb-6">
            Update Header
        </h2>

        <form th:action="@{/update/header}"
              method="post"
              enctype="multipart/form-data"
              class="space-y-4">

            <!-- ID -->
            <input type="hidden"
                   name="id"
                   th:value="${header.id}">

            <!-- School Name -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">School Name</label>
                <input type="text"
                       name="schoolName"
                       th:value="${header.schoolName}"
                       class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Affiliation -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">Affiliation</label>
                <input type="text"
                       name="affiliation"
                       th:value="${header.affiliation}"
                       class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Affiliation No -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">Affiliation No</label>
                <input type="text"
                       name="affiliationNo"
                       th:value="${header.affiliationNo}"
                       class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Location -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">Location</label>
                <input type="text"
                       name="location"
                       th:value="${header.location}"
                       class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">Phone</label>
                <input type="text"
                       name="phone"
                       th:value="${header.phone}"
                       class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">Email</label>
                <input type="email"
                       name="email"
                       th:value="${header.email}"
                       class="w-full mt-1 p-2 border rounded-md focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Logo -->
            <div>
                <label class="block text-sm font-semibold text-gray-700">Logo</label>
                <input type="file"
                       name="image"
                       class="w-full mt-1 p-2 border rounded-md bg-white">
            </div>

            <!-- Button -->
            <div class="pt-4">
                <button type="submit"
                        class="w-full bg-blue-900 text-white py-2 rounded-md hover:bg-blue-800 transition">
                    Update
                </button>
            </div>

        </form>

    </div>

</body>

</html>
