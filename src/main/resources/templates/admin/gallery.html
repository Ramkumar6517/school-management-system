<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Gallery Upload</title>

<script src="https://cdn.tailwindcss.com"></script>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">


<style>

.crop-area{

max-height:400px;
overflow:hidden;

}


#preview{

max-width:100%;
display:block;

}

</style>


</head>


<body class="bg-gray-100 min-h-screen">


<div th:replace="~{fragments/navbar :: navbar}"></div>




<!-- UPLOAD SECTION -->

<div class="flex justify-center p-5">


<div class="bg-white shadow-xl rounded-xl w-full max-w-lg p-6">


<h2 class="text-2xl font-bold text-center text-blue-900 mb-6">

Upload Gallery Image

</h2>



<div id="message"
class="hidden mb-4 p-3 rounded text-center font-semibold">
</div>




<form id="uploadForm"

method="post"

enctype="multipart/form-data"

class="space-y-5">





<label class="font-semibold">

Select Image

</label>



<input type="file"

id="file"

name="file"

accept="image/*"

required

class="w-full border p-3 rounded">





<div class="crop-area bg-gray-100 rounded shadow">


<img id="preview"
class="hidden">


</div>





<button type="button"

id="removeImage"

class="hidden w-full bg-red-600 text-white py-2 rounded">


Remove Selected Image


</button>






<label class="font-semibold">

Category

</label>



<select name="category"

id="uploadCategory"

class="w-full border p-3 rounded">


<option value="GALLERY">

Gallery

</option>


<option value="SPORTS">

Sports

</option>


<option value="EVENT">

Event

</option>



</select>






<button

type="submit"

class="w-full bg-blue-900 text-white py-3 rounded">


Upload Image


</button>



</form>



</div>

</div>






<!-- MANAGE IMAGES -->


<div class="p-6">


<h2 class="text-3xl font-bold text-blue-900 text-center mb-6">


Manage Gallery Images


</h2>





<div class="flex justify-center mb-6">


<select id="filterCategory"

class="border p-3 rounded-lg">


<option value="GALLERY">

Gallery

</option>


<option value="SPORTS">

Sports

</option>


<option value="EVENT">

Event

</option>


</select>



</div>





<div id="imageContainer"

class="grid grid-cols-1 md:grid-cols-4 gap-6">


</div>



</div>





<div th:replace="~{fragments/footer :: footer}"></div>





<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>




<script>



let cropper=null;


let preview=document.getElementById("preview");


let removeImage=document.getElementById("removeImage");






// IMAGE SELECT


document.getElementById("file")
.addEventListener("change",function(){



let file=this.files[0];


if(!file)
return;



preview.src=URL.createObjectURL(file);


preview.classList.remove("hidden");


removeImage.classList.remove("hidden");



if(cropper){

cropper.destroy();

}




cropper=new Cropper(preview,{


aspectRatio:NaN,

viewMode:1,

autoCropArea:1,

movable:true,

zoomable:true,

background:false



});



});






// REMOVE SELECTED IMAGE


removeImage.onclick=function(){



document.getElementById("file").value="";


preview.src="";


preview.classList.add("hidden");


removeImage.classList.add("hidden");



if(cropper){

cropper.destroy();

cropper=null;

}



};







// UPLOAD



document.getElementById("uploadForm")
.addEventListener("submit",function(e){


e.preventDefault();



let data=new FormData(this);





if(cropper){



cropper.getCroppedCanvas({

width:800,

height:800


})
.toBlob(function(blob){



data.set("file",blob,"gallery.png");


saveImage(data);



});



}

else{


saveImage(data);


}



});







function saveImage(data){



fetch("/admin/gallery/save",{


method:"POST",

body:data


})


.then(res=>{


if(res.ok){


showMessage(

"Image uploaded successfully ✅",

"bg-green-100 text-green-700"

);



location.reload();



}


});



}








// LOAD CATEGORY IMAGES


document.getElementById("filterCategory")
.addEventListener("change",function(){


loadImages(this.value);


});





loadImages("GALLERY");






function loadImages(category){



fetch("/api/gallery?category="+category)


.then(res=>res.json())


.then(data=>{



let html="";




data.forEach(img=>{


html+=`


<div class="bg-white shadow rounded-xl p-4">


<img src="${img.imagePath}"

class="w-full h-52 object-cover rounded">



<p class="text-center font-semibold mt-3">

${img.category}

</p>



<button

onclick="deleteImage(${img.id})"

class="mt-3 w-full bg-red-600 text-white py-2 rounded">


Delete


</button>



</div>



`;



});




document.getElementById("imageContainer")
.innerHTML=html;



});



}







// DELETE IMAGE



function deleteImage(id){



if(!confirm("Delete this image?"))

return;




fetch("/admin/gallery/delete/"+id,{


method:"DELETE"


})



.then(res=>{


if(res.ok){


alert("Image deleted ✅");


location.reload();



}


});



}







function showMessage(text,color){


let msg=document.getElementById("message");


msg.innerHTML=text;


msg.className=
"mb-4 p-3 rounded text-center font-semibold "+color;


msg.classList.remove("hidden");



}



</script>



</body>

</html>
