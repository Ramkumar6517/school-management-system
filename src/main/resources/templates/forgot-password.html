<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Forgot Password</title>

<script src="https://cdn.tailwindcss.com"></script>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>


<body class="bg-gray-100 min-h-screen flex items-center justify-center">


<div class="bg-white shadow-2xl rounded-xl p-8 w-full max-w-md">



<div class="text-center mb-6">


<i class="fa-solid fa-key text-blue-900 text-5xl"></i>


<h1 class="text-2xl font-bold text-blue-900 mt-3">

Forgot Password

</h1>


<p class="text-gray-500">

Reset Administrator Password with OTP

</p>


</div>





<!-- EMAIL BOX -->

<div id="emailBox">


<input

id="email"

type="email"

placeholder="Enter Registered Email"

class="w-full border p-3 rounded-lg mb-4">



<button

onclick="sendOtp()"

class="w-full bg-blue-900 text-white p-3 rounded-lg">


Send OTP


</button>


</div>







<!-- RESET BOX -->


<div id="resetBox" style="display:none;">



<input

id="otp"

type="text"

placeholder="Enter OTP"

class="w-full border p-3 rounded-lg mb-4">





<input

id="newPassword"

type="password"

placeholder="Enter New Password"

class="w-full border p-3 rounded-lg mb-4">





<button

onclick="resetPassword()"

class="w-full bg-green-600 text-white p-3 rounded-lg">


Reset Password


</button>


</div>





<p id="msg"

class="text-center mt-4 font-bold">


</p>



</div>








<script>



function sendOtp(){


let msg =
document.getElementById("msg");


msg.innerHTML =
"Checking email...";



fetch("/Administrator/send-reset-otp",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({

email:
document.getElementById("email").value

})


})


.then(res=>res.text())


.then(result=>{


if(result=="success"){



msg.innerHTML =
"✔ OTP sent to your email";



document.getElementById("emailBox")
.style.display="none";


document.getElementById("resetBox")
.style.display="block";



}

else{


msg.innerHTML =
"❌ Email not registered";


}


});


}








function resetPassword(){



let msg =
document.getElementById("msg");



msg.innerHTML =
"Verifying OTP...";



fetch("/Administrator/reset-password",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({


otp:
document.getElementById("otp").value,


password:
document.getElementById("newPassword").value


})


})



.then(res=>res.text())


.then(result=>{


if(result=="success"){


msg.innerHTML =
"✔ Password changed successfully";


setTimeout(()=>{


window.location="/Administrator/login";


},1500);


}

else{


msg.innerHTML =
"❌ Wrong OTP";


}


});



}



</script>



</body>

</html>
